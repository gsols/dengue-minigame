<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dengue Prevention Mini-Game</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;600;700&family=Anton&family=Impact&display=swap" rel="stylesheet">
<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Archivo Narrow', sans-serif;
        overflow: hidden;
        cursor: url('https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/swatter-removebg-preview%20(1).png') 0 0, auto;
    }

    .wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin: auto;
        justify-content: center;
        align-items: center;
    }

    #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
        background: url('https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/Community.png') no-repeat center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 20px;
        box-sizing: border-box;
    }

    #question-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 1800px;
        height: auto;
        background: rgba(255,255,255,0.85);
        border-radius: 10px;
        padding: 32px;
        text-align: center;
        justify-content: center;
        max-height: 85vh;
        overflow-y: auto;
    }

    #question-box {
        font-size: 2.1rem;
        font-weight: 700;
        margin-bottom: 20px;
        font-family: 'Archivo Narrow', sans-serif;
    }

    #choices-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
    }

    .choice-btn {
        width: 400px;
        max-width: 85%;
        padding: 16px;
        margin: 11px 0;
        font-size: 1.28rem;
        font-weight: bold;
        background-color: #754db9;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-family: 'Archivo Narrow', sans-serif;
    }

    .choice-btn:hover { background-color: #d29504; }

    .choice-btn:disabled {
        background-color: #BDBDBD;
        cursor: not-allowed;
        opacity: 0.6;
        pointer-events: none;
    }

    #feedback {
        font-size: 1.15rem;
        margin-top: 13px;
        min-height: 28px;
        text-align: center;
    }

    #next-btn {
        padding: 16px 36px;
        font-size: 1.2rem;
        font-weight: bold;
        background-color: #f0c901;
        color: #3a215b;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 15px auto 11px auto;
        display: none;
        font-family: 'Anton', sans-serif;
    }}}}}

    #next-btn:hover {
        background-color: #efc801;
    }

    #retry-btn {
        padding: 14px 32px;
        font-size: 1.1rem;
        font-weight: bold;
        background-color: #d29504;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
        font-family: 'Anton', sans-serif;
    }

    #retry-btn:hover {
        background-color: #d59902;
    }

    .mosquito {
        position: absolute;
        width: 50px;
        height: 50px;
        pointer-events: auto;
        cursor: pointer;
        transition: transform 0.1s linear;
        z-index: 10;
    }

    @keyframes splat {
        0% {
            transform: scale(1);
            opacity: 1;
        }
        50% {
            transform: scale(1.3);
        }
        100% {
            transform: scale(0);
            opacity: 0;
        }
    }

    .mosquito.squashed {
        animation: splat 0.4s ease-out forwards;
    }

    .splash {
        position: absolute;
        width: 80px;
        height: 80px;
        pointer-events: none;
        z-index: 11;
        animation: splashFade 0.9s ease-out forwards;
    }

    @keyframes splashFade {
        0% {
            opacity: 1;
            transform: scale(0.8);
        }
        50% {
            opacity: 1;
        }
        100% {
            opacity: 0;
            transform: scale(1.2);
        }
    }

    #intro-section {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/Mosq.png') no-repeat center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
    }

    #intro-content {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 60px 40px;
        text-align: center;
        width: 1500px;
        height: 1200px
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    #intro-title {
        font-size: 7.5rem;
        font-weight: 700;
        color: #D32F2F;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: 'Impact', sans-serif;
    }

    #intro-subtitle {
        font-size: 1.5rem;
        color: #754db9;
        margin-bottom: 30px;
        font-style: italic;
        font-family: 'Archivo Narrow', sans-serif;
    }

    #intro-prompt {
        font-size: 1.8rem;
        color: #333;
        margin-bottom: 40px;
        font-weight: 500;
        font-family: 'Archivo Narrow', sans-serif;
    }

    #play-btn {
        padding: 15px 50px;
        font-size: 1.5rem;
        font-weight: bold;
        background-color: #d29504;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: 'Anton', sans-serif;
    }

    #play-btn:hover {
        background-color: #f0c901;
        color: #3a215b;
    }

    #play-btn:active {
        transform: scale(0.98);
    }

    .end-game-main-text {
        font-size: 5rem;
        font-family: 'Impact', sans-serif;
        font-weight: 700;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .end-game-subtext {
        font-size: 1.6rem;
        font-family: 'Archivo Narrow', sans-serif;
        font-weight: 600;
        color: #3a215b;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    #question-image {
        max-width: 480px;
        max-height: 270px;
        margin-bottom: 15px;
        border-radius: 10px;
        object-fit: cover;
    }
</style>
</head>
<body>
<div id="intro-section">
    <div id="intro-content">
        <div id="intro-title">STOP THE RISK!</div>
        <div id="intro-subtitle">a Dengue Prevention Mini Game</div>
        <div id="intro-prompt">Are You Ready?</div>
        <button id="play-btn">Let's Play!</button>
    </div>
</div>

<div id="game-container" style="display: none;">
    <div class="wrapper">
        <div id="question-panel">
            <img id="question-image" style="display: none;" alt="Question image">
            <div id="question-box"></div>
            <div id="choices-container"></div>
            <div id="feedback"></div>
            <button id="next-btn">Next Question</button>
        </div>        
    </div>

</div>

<script>
const scenarios = [
{"question":"You see stagnant water in old tires. What should you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/1.webp","choices":["Ignore it","Drain the water","Add more water"],"answer":"Drain the water","feedback":"Draining stagnant water prevents mosquito breeding."},
{"question":"You find an uncovered water container outside your house. You should:","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/2.jpg","choices":["Cover it","Leave it open","Use it as is"],"answer":"Cover it","feedback":"Covering containers stops mosquitoes from laying eggs."},
{"question":"You noticed a clogged drainage in your backyard.What will you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/3.jpg","choices":["Clean it","Ignore it","Throw trash in it"],"answer":"Clean it","feedback":"Cleaning drains removes stagnant water that breeds mosquitoes."},
{"question":"You notice mosquito larvae in a small pond in front of your house. What is your best action?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/4.jpg","choices":["Leave it","Add fish","Throw chemicals randomly"],"answer":"Add fish","feedback":"Fish eat mosquito larvae and reduce mosquito population."},
{"question":"You see water collected in your flower pots. What should you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/5.jpg","choices":["Drain it","Add more water","Ignore it"],"answer":"Drain it","feedback":"Emptying pots prevents mosquitoes from breeding."},
{"question":"Your neighbor notices old tires with water outside your house and tells you about it. What will you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/6.webp","choices":["Remove them","Use as planters","Leave them"],"answer":"Remove them","feedback":"Old tires collect water and should be removed."},
{"question":"You find a pail left open outside. What is your best action?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/7.webp","choices":["Cover it","Use it","Ignore it"],"answer":"Cover it","feedback":"Covering containers prevents mosquito breeding."},
{"question":"Unkept or uncleaned swimming pool water. What is the best action?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/8.webp","choices":["Clean and chlorinate","Leave it dirty","Add plants"],"answer":"Clean and chlorinate","feedback":"Pools must be treated to prevent mosquito breeding."},
{"question":"Your neighbor notices trash outside your house collecting rainwater. What will you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/9.jpg","choices":["Remove trash","Ignore","Burn trash"],"answer":"Remove trash","feedback":"Trash traps water and must be disposed to prevent mosquitoes."},
{"question":"Water bottle caps are lying outside. You should:","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/10.webp","choices":["Throw them away","Use them","Ignore"],"answer":"Throw them away","feedback":"Small containers collect water and must be removed."},
{"question":"You have uncovered water pails in your comfort room. You should:","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/11.webp","choices":["Cover them","Leave them","Pour out water elsewhere"],"answer":"Cover them","feedback":"Cover jars to prevent mosquito breeding."},
{"question":"Mosquitoes will most likely breed in which area?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/12.png","choices":["Under the Bed","In Uncovered Water Container","In a Covered Pitcher containing Orange Juice"],"answer":"In Uncovered Water Container","feedback":"Uncovered water containers are prime breeding grounds for mosquitoes."},
{"question":"Old, empty, and opened cans are outside your house. what should you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/13.jpg","choices":["Remove them","Leave them","Fill with sand"],"answer":"Remove them","feedback":"Cans collect water and must be removed."},
{"question":"Plastic containers are collecting rainwater outside your house. You should:","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/14.webp","choices":["Cover or empty","Leave them","Add soap"],"answer":"Cover or empty","feedback":"Emptying or covering prevents mosquito breeding."},
{"question":"Buckets used for washing clothes were left outside. What is the best action to take?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/15.jpg","choices":["Empty after use","Leave them","Cover them all times"],"answer":"Empty after use","feedback":"Buckets must not hold stagnant water."},
{"question":"Unused tires in backyard. What should you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/16.webp","choices":["Dispose of them","Keep them","Use as flower pots"],"answer":"Dispose of them","feedback":"Tires are mosquito breeding grounds."},
{"question":"An empty and unused boot collects rainwater in your backyard. What should you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/17.jpg","choices":["Remove or drain","Wear it during rainy days","Cover partially"],"answer":"Remove or drain","feedback":"Eliminating stagnant water prevents mosquito breeding."},
{"question":"You notice water collecting behind your refrigerator after defrosting. What will you do?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/18.webp","choices":["Drain/Empty","Leave it be","Add chemicals"],"answer":"Drain/Empty","feedback":"Stagnant water must be drained to prevent mosquito breeding."},
{"question":"Rainwater collects in tarpaulin sheets in front of your house. You should:","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/19.jpg","choices":["Drain it","Leave it","Shake occasionally"],"answer":"Drain it","feedback":"Stagnant water must be drained."},
{"question":"Where are mosquitoes less likely to breed?","image":"https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/20.png","choices":["In Clean Water","In Covered Containers","In Stagnant Water"],"answer":"In Covered Containers","feedback":"Covered containers prevent mosquito access to water."}
];

let current = 0;
let score = 0;
let mosquitoes = [];
let gameStarted = false;

const questionBox = document.getElementById('question-box');
const choicesContainer = document.getElementById('choices-container');
const feedbackBox = document.getElementById('feedback');
const nextBtn = document.getElementById('next-btn');
const container = document.getElementById('game-container');
const introSection = document.getElementById('intro-section');
const gameContainer = document.getElementById('game-container');
const playBtn = document.getElementById('play-btn');
const questionImage = document.getElementById('question-image');

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

playBtn.onclick = () => {
    current = 0;
    score = 0;
    shuffleArray(scenarios);
    introSection.style.display = 'none';
    gameContainer.style.display = 'flex';
    gameStarted = true;
    showQuestion();
    moveMosquitoes();
};

function showQuestion() {
    const q = scenarios[current];
    questionBox.textContent = q.question;
    feedbackBox.textContent = '';
    choicesContainer.innerHTML = '';
    
    // Display image if available
    if(q.image) {
        questionImage.src = q.image;
        questionImage.style.display = 'block';
    } else {
        questionImage.style.display = 'none';
    }

    q.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.textContent = choice;
        btn.className = 'choice-btn';
        btn.onclick = () => checkAnswer(choice);
        choicesContainer.appendChild(btn);
    });

    nextBtn.style.display = 'none';
}

function checkAnswer(choice) {
    const q = scenarios[current];
    if(choice === q.answer){
        feedbackBox.textContent = "✅ Correct! " + q.feedback;
        score++;
    } else {
        feedbackBox.textContent = `❌ Wrong! Correct: ${q.answer}. ${q.feedback}`;
        addMosquito();
    }
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
    current++;
    if(current < scenarios.length){
        showQuestion();
    } else {
        const message = getEndGameMessage(score);
        
        const mainTextEl = document.createElement('div');
        mainTextEl.className = 'end-game-main-text';
        mainTextEl.style.color = message.color;
        mainTextEl.textContent = message.mainText;
        
        const subtextEl = document.createElement('div');
        subtextEl.className = 'end-game-subtext';
        subtextEl.textContent = message.subtext;
        
        const scoreEl = document.createElement('div');
        scoreEl.style.fontSize = '1.5rem';
        scoreEl.style.marginBottom = '30px';
        scoreEl.style.color = '#3a215b';
        scoreEl.style.fontWeight = '600';
        scoreEl.textContent = `Your Score: ${score}/${scenarios.length}`;
        
        questionBox.textContent = '';
        feedbackBox.textContent = '';
        choicesContainer.innerHTML = '';
        nextBtn.style.display = 'none';
        
        choicesContainer.appendChild(mainTextEl);
        choicesContainer.appendChild(subtextEl);
        choicesContainer.appendChild(scoreEl);
        
        const retryBtn = document.createElement('button');
        retryBtn.id = 'retry-btn';
        retryBtn.textContent = 'Retry Game';
        retryBtn.onclick = resetGame;
        choicesContainer.appendChild(retryBtn);
    }
};

function getEndGameMessage(score) {
    if (score === 20) {
        return {
            mainText: 'Perfect!',
            subtext: 'You kept your home completely safe from the threat of mosquitoes.',
            color: '#2E7D32'
        };
    } else if (score >= 17 && score <= 19) {
        return {
            mainText: 'Excellent!',
            subtext: 'Great job! Your home is very well protected, with only minimal risks remaining.',
            color: '#F57C00'
        };
    } else if (score >= 14 && score <= 16) {
        return {
            mainText: 'Well Done!',
            subtext: 'You reduced many mosquito risks, but could still use some guidance.',
            color: '#1976D2'
        };
    } else if (score >= 8 && score <= 13) {
        return {
            mainText: 'Needs Improvement!',
            subtext: 'There seems to be a lot of mosquitoes around. Some mosquito breeding spots are still present. Keep working to make your home safer.',
            color: '#D32F2F'
        };
    } else {
        return {
            mainText: 'Warning!',
            subtext: 'OH NO! Your Home is Overrun by Mosquitoes! Your home is at high risk for mosquito breeding. Take action now to prevent disease.',
            color: '#C62828'
        };
    }
}

function resetGame(){
    current = 0;
    score = 0;
    mosquitoes.forEach(m => m.el.remove());
    mosquitoes = [];
    shuffleArray(scenarios);
    showQuestion();
}

function addMosquito(){
    const imgName = Math.random() < 0.5 ? 'https://static.wixstatic.com/media/f06840_531c960099b44af09cfe4856fdad2970~mv2.png' : 'https://static.wixstatic.com/media/f06840_59c5b4822e07470b82e951fbe964425a~mv2.png';
    const mosquito = document.createElement('img');
    mosquito.src = imgName;
    mosquito.className = 'mosquito';
    mosquito.style.left = Math.random()*80 + 'vw';
    mosquito.style.top = Math.random()*50 + 20 + 'vh';
    container.appendChild(mosquito);
    const mosquitoObj = {el: mosquito, dx: Math.random()*2+0.5, dy: Math.random()*2+0.5};
    mosquitoes.push(mosquitoObj);
    
    mosquito.onclick = (e) => {
        e.stopPropagation();
        if (!mosquito.classList.contains('squashed')) {
            mosquito.classList.add('squashed');
            
            // Create splash effect
            const splash = document.createElement('img');
            splash.src = 'https://raw.githubusercontent.com/gsols/dengue-minigame/refs/heads/main/Blood.png';
            splash.className = 'splash';
            splash.style.left = mosquito.style.left;
            splash.style.top = mosquito.style.top;
            container.appendChild(splash);
            
            // Remove splash after animation
            setTimeout(() => {
                splash.remove();
            }, 900);
            
            // Remove mosquito after animation completes
            setTimeout(() => {
                const index = mosquitoes.indexOf(mosquitoObj);
                if (index > -1) {
                    mosquitoes.splice(index, 1);
                }
                mosquito.remove();
            }, 400);
        }
    };
}

function moveMosquitoes(){
    mosquitoes.forEach(m=>{
        let x = parseFloat(m.el.style.left);
        let y = parseFloat(m.el.style.top);
        x += (Math.random()<0.5 ? -1:1)*m.dx;
        y += (Math.random()<0.5 ? -1:1)*m.dy;
        if(x<0) x=0; if(x>95) x=95;
        if(y<20) y=20; if(y>90) y=90;
        m.el.style.left = x + 'vw';
        m.el.style.top = y + 'vh';
    });
    requestAnimationFrame(moveMosquitoes);
}

// Game starts when user clicks "Let's Play!"
</script>
</body>
</html>
